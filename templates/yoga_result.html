<!DOCTYPE html>
<html>
<head>
    <title>Yoga Result</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="min-h-screen flex flex-col items-center justify-center 
bg-gradient-to-br from-blue-200 via-purple-200 to-pink-200 p-6">
<!-- TITLE -->
<div class="text-center mb-10">

    <h1 class="text-4xl md:text-5xl font-extrabold text-white tracking-wide">
        Yoga for  {{ problem }} 
    </h1>

    <p class="text-white/80 mt-3 text-sm md:text-base">
        Recommended poses to help improve your condition
    </p>

</div>

<!-- GRID -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl w-full">

    {% for item in result %}
    <!-- CARD -->
    <div class="bg-white/20 backdrop-blur-lg border border-white/30 
                rounded-3xl shadow-2xl overflow-hidden 
                hover:scale-105 transition duration-300">

        <!-- IMAGE -->
        <div class="h-56 overflow-hidden">
            <img src="{{ url_for('static', filename=item.image) }}"
                 class="w-full h-full object-cover">
        </div>

        <!-- CONTENT -->
        <div class="p-6 text-center">
            <h2 class="text-xl font-semibold text-white mb-2">
                {{ item.name }}
            </h2>

            <p class="text-white/80 text-sm">
                {{ item.benefit }}
            </p>
        </div>

    </div>
    {% endfor %}

</div>

<!-- BUTTON -->
<div class="mt-10">
    <a href="/"
       class="bg-white text-purple-600 px-8 py-3 rounded-full 
              font-semibold shadow-lg hover:scale-105 transition">
        ← Go Back
    </a>
</div>

</body>
</html>
